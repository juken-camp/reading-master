const S = (obj) => obj; // style helper

// ─── SOUND EFFECTS (Web Audio API) ───
let _audioCtx = null;
const getCtx = () => { if(!_audioCtx) _audioCtx = new (window.AudioContext||window.webkitAudioContext)(); return _audioCtx; };
const playSound = (type) => {
  try {
    const ctx = getCtx();
    const g = ctx.createGain();
    g.connect(ctx.destination);
    const now = ctx.currentTime;
    if(type==="tap"){
      // ポコッ（軽快なタップ音）
      const o=ctx.createOscillator();o.type="sine";o.frequency.value=880;
      o.frequency.exponentialRampToValueAtTime(440,now+0.06);
      g.gain.setValueAtTime(0.18,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.1);
      o.connect(g);o.start(now);o.stop(now+0.1);
    } else if(type==="select"){
      // ポン（選択肢を選ぶ音）
      const o=ctx.createOscillator();o.type="sine";o.frequency.value=660;
      g.gain.setValueAtTime(0.15,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.12);
      o.connect(g);o.start(now);o.stop(now+0.12);
    } else if(type==="correct"){
      // ピンポンパン♪（正解の三和音）
      [523,659,784].forEach((f,i)=>{
        const o=ctx.createOscillator();const g2=ctx.createGain();
        o.type="sine";o.frequency.value=f;
        g2.gain.setValueAtTime(0.2,now+i*0.12);g2.gain.exponentialRampToValueAtTime(0.001,now+i*0.12+0.35);
        o.connect(g2);g2.connect(ctx.destination);o.start(now+i*0.12);o.stop(now+i*0.12+0.35);
      });
    } else if(type==="wrong"){
      // ブブー（不正解音）
      [200,180].forEach((f,i)=>{
        const o=ctx.createOscillator();const g2=ctx.createGain();
        o.type="square";o.frequency.value=f;
        g2.gain.setValueAtTime(0.1,now+i*0.15);g2.gain.exponentialRampToValueAtTime(0.001,now+i*0.15+0.18);
        o.connect(g2);g2.connect(ctx.destination);o.start(now+i*0.15);o.stop(now+i*0.15+0.18);
      });
    } else if(type==="reveal"){
      // シャラン（答え表示音）
      [440,554,659].forEach((f,i)=>{
        const o=ctx.createOscillator();const g2=ctx.createGain();
        o.type="sine";o.frequency.value=f;
        g2.gain.setValueAtTime(0.12,now+i*0.05);g2.gain.exponentialRampToValueAtTime(0.001,now+i*0.05+0.3);
        o.connect(g2);g2.connect(ctx.destination);o.start(now+i*0.05);o.stop(now+i*0.05+0.3);
      });
    } else if(type==="nav"){
      // ピッ（ページ移動音）
      const o=ctx.createOscillator();o.type="sine";o.frequency.value=700;
      g.gain.setValueAtTime(0.1,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.08);
      o.connect(g);o.start(now);o.stop(now+0.08);
    } else if(type==="open"){
      // シュッ（セクション開閉音）
      const o=ctx.createOscillator();o.type="triangle";o.frequency.value=500;
      o.frequency.exponentialRampToValueAtTime(800,now+0.1);
      g.gain.setValueAtTime(0.12,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.14);
      o.connect(g);o.start(now);o.stop(now+0.14);
    } else if(type==="scroll"){
      // トゥン（問題へスクロール音）
      const o=ctx.createOscillator();o.type="sine";o.frequency.value=600;
      o.frequency.exponentialRampToValueAtTime(900,now+0.08);
      g.gain.setValueAtTime(0.13,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.15);
      o.connect(g);o.start(now);o.stop(now+0.15);
    }
  } catch(e){}
};

// LEARN PAGE
// ═══════════════════════════════════════
function LearnPage({openSecs,toggleSec,openProbs,setOpenProbs,toggleProb,showAnswers,showAns,solved,search,setSearch,PROBLEMS}) {
  const chColors = {"ch1":"#2563eb","ch2":"#2563eb","ch3":"#7c3aed","ch4":"#dc2626","ch5":"#0d9488","ch6":"#d97706","ch7":"#0891b2","ch8":"#059669","ch9":"#e11d48"};
  const chBgs = {"ch1":"#dbeafe","ch2":"#dbeafe","ch3":"#ede9fe","ch4":"#fee2e2","ch5":"#ccfbf1","ch6":"#fef3c7","ch7":"#cffafe","ch8":"#d1fae5","ch9":"#ffe4e6"};

  return (
    <div className="slide-up">
      <div style={S({background:"linear-gradient(145deg,#0c1222,#1a2744)",padding:"1.5rem 1.2rem 1rem"})}>
        <div style={S({fontFamily:"'Zen Maru Gothic',sans-serif",fontSize:"1.25rem",fontWeight:900,color:"#fff"})}>📚 テクニックを学ぶ</div>
        <div style={S({fontSize:".72rem",color:"#94a3b8",marginTop:".2rem"})}>3大原則 + 全110ポイント（9章構成） + 練習問題つき</div>
      </div>

      {/* Search */}
      <div style={S({padding:".6rem 1rem 0"})}>
        <div style={S({position:"relative"})}>
          <span style={S({position:"absolute",left:".75rem",top:"50%",transform:"translateY(-50%)",fontSize:".85rem",color:C.sub})}>🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="キーワードで検索…"
            style={S({width:"100%",padding:".6rem .8rem .6rem 2.2rem",borderRadius:"10px",border:`1px solid ${C.bdr}`,background:"#fff",fontSize:".82rem",outline:"none"})}/>
        </div>
      </div>

      <div style={S({padding:".6rem 1rem 1rem"})}>
        {POINT_GROUPS.map(g => {
          const groupProblems = PROBLEMS.filter(p=>p.cat===g.cat || (g.cat==="common" && p.cat==="common"));
          const techProblems = PROBLEMS.filter(p => {
            if(g.id==="ch1") return ["消去法","消去法の極端語チェック"].some(t=>p.tech===t); // test prep techniques
            if(g.id==="ch2") return ["逆接の後ろ＝主張","つまり＝まとめ","文末表現","疑問形の主張","一般論→しかし→主張"].some(t=>p.tech===t);
            if(g.id==="ch3") return ["逆接の後ろ＝主張","つまり＝まとめ","文末表現","疑問形の主張","一般論→しかし→主張","キーワードの繰り返し","文頭文末に主張","反対意見→主張","課題→解決策","一言まとめ","呼びかけ＝クライマックス","抽象→具体→抽象","段落冒頭の役割","定義文","問題提起→展開→結論","段落の役割","第一に・第二に","対比を見抜く","因果関係","具体例の役割","データの役割","引用の賛否","指示語","指示語が遠い場合","比喩の読み取り","難語の推測","長い比喩"].some(t=>p.tech===t);
            if(g.id==="ch4") return ["セリフの心情","セリフの言い方","独白（心の声）","「〜そうに」「〜げに」","比喩的な感情表現","地の文と本音","心情変化 B→A","回想シーン","情景描写＝心の鏡","「不意に」＝転機","感情の繰り返し","行動から心情","人物関係の整理","風景だけの描写","ラストの余韻","主人公の恥ずかしさ"].some(t=>p.tech===t);
            if(g.id==="ch5") return ["消去法","消去法の極端語チェック","傍線の前後","要旨問題","内容一致","図表と本文の対応","なぜか→だから","どういうことか→ということ","比喩の言い換え記述","説明問題の解法","理由を問う記述","まとめの記述","字数を意識した記述","空欄にしない"].some(t=>p.tech===t);
            if(g.id==="ch6") return ["比喩の読み取り","比喩の言い換え記述","長い比喩"].some(t=>p.tech===t);
            if(g.id==="ch7") return false; // 知識系なので練習問題は別形式
            if(g.id==="ch8") return false; // 勉強法なので練習問題なし
            if(g.id==="ch9") return false; // 本番ルールなので練習問題なし
            return false;
          });

          const matchesSearch = !search || g.title.includes(search) || g.points.some(p=>p.includes(search));
          if(!matchesSearch) return null;

          const catCol = chColors[g.id]||C.pur;
          const catBg = chBgs[g.id]||C.purL;
          const isOpen = openSecs.has(g.id);

          return (
            <div key={g.id} id={"section-"+g.id} style={S({background:"#fff",borderRadius:"14px",marginBottom:".65rem",overflow:"hidden",border:`1px solid ${C.bdr}`,boxShadow:"0 1px 4px rgba(0,0,0,.03)"})}>
              {/* Section Header */}
              <div onClick={()=>toggleSec(g.id)} style={S({padding:".8rem 1rem",cursor:"pointer",display:"flex",alignItems:"center",gap:".55rem",userSelect:"none",borderLeft:`4px solid ${catCol}`})}>
                <div style={S({width:"32px",height:"32px",borderRadius:"9px",background:catBg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:".95rem",flexShrink:0})}>{g.icon}</div>
                <div style={S({flex:1})}>
                  <div style={S({fontFamily:"'Zen Maru Gothic',sans-serif",fontWeight:700,fontSize:".87rem"})}>{g.title}</div>
                  <div style={S({fontSize:".62rem",color:C.sub})}>{g.subtitle ? g.subtitle+" ─ " : ""}{g.points.length}ポイント{techProblems.length > 0 && ` + ${techProblems.length}問`}</div>
                </div>
                <div style={S({fontSize:".65rem",color:C.sub,transition:"transform .3s",transform:isOpen?"rotate(180deg)":"none"})}>▼</div>
              </div>

              {/* Section Body */}
              {isOpen && (
                <div style={S({padding:"0 1rem 1rem",animation:"slideUp .3s ease"})}>
                  {/* Points */}
                  {g.points.filter(p=> !search || p.includes(search)).map((pt,i)=>{
                    const hasProblem = techProblems.length > 0;
                    const isImportant = pt.startsWith("★");
                    const displayText = isImportant ? pt.slice(1) : pt;
                    return (
                      <button key={i}
                        onClick={(e)=>{
                          e.stopPropagation();
                          if(hasProblem){
                            playSound("scroll");
                            const n=new Set(openProbs);n.add(g.id);setOpenProbs(n);
                            setTimeout(()=>{const el=document.getElementById("prob-section-"+g.id);if(el)el.scrollIntoView({behavior:"smooth",block:"start"});},200);
                          }
                        }}
                        style={S({
                          display:"block",width:"100%",textAlign:"left",
                          padding:".6rem .75rem",borderRadius:"8px",marginBottom:".35rem",
                          fontSize:".8rem",lineHeight:1.7,
                          background:isImportant ? `linear-gradient(135deg,${catBg},#fff)` : catBg,
                          border:"none",borderLeftWidth:isImportant?"4px":"3px",borderLeftStyle:"solid",borderLeftColor:isImportant?C.gold:catCol,
                          cursor:hasProblem?"pointer":"default",
                          position:"relative",
                          fontFamily:"inherit",color:"inherit",
                          WebkitTapHighlightColor:"transparent",
                          fontWeight:isImportant?600:400,
                        })}
                      >
                        {isImportant && <span style={S({color:C.gold,marginRight:".2rem",fontSize:".85rem"})}>★</span>}
                        {displayText}
                        {hasProblem && <span style={S({position:"absolute",right:".6rem",top:"50%",transform:"translateY(-50%)",fontSize:".55rem",color:catCol,opacity:.6,fontWeight:700})}>📝→</span>}
                      </button>
                    );
                  })}

                  {/* Problems */}
                  {techProblems.length > 0 && (
                    <div id={"prob-section-"+g.id} style={S({marginTop:".5rem"})}>
                      <button onClick={()=>toggleProb(g.id)}
                        style={S({display:"flex",alignItems:"center",gap:".35rem",padding:".4rem .75rem",borderRadius:"8px",background:"linear-gradient(135deg,#0f172a,#1e293b)",color:"#e2e8f0",fontSize:".75rem",fontWeight:700,border:"none",cursor:"pointer",fontFamily:"'Zen Maru Gothic',sans-serif"})}>
                        📝 練習問題を解く（{techProblems.length}問）
                        <span style={S({fontSize:".55rem",transition:"transform .3s",transform:openProbs.has(g.id)?"rotate(180deg)":"none"})}>▼</span>
                      </button>

                      {openProbs.has(g.id) && techProblems.map(prob=>(
                        <ProblemCard key={prob.id} prob={prob} showAnswers={showAnswers} showAns={showAns} solved={solved} catCol={catCol}/>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════
// PROBLEM CARD
// ═══════════════════════════════════════
function ProblemCard({prob,showAnswers,showAns,solved,catCol}) {
  const [selected, setSelected] = useState(null);
  const isAnswered = showAnswers.has(prob.id);
  const isSolved = solved.has(prob.id);

  const renderPassage = (text) => {
    const parts = text.split(/\u2605(.*?)\u2605/g);
    return parts.map((part,i) => i%2===1
      ? <span key={i} style={{borderBottom:`2px solid ${catCol}`,paddingBottom:"1px",fontWeight:600}}>{part}</span>
      : <span key={i}>{part}</span>
    );
  };

  return (
    <div style={S({marginTop:".5rem",border:`1.5px solid ${C.bdr}`,borderRadius:"12px",overflow:"hidden",background:"#fafaf8",animation:"slideUp .3s ease"})}>
      <div style={S({background:"linear-gradient(135deg,#f8fafc,#f1f5f9)",padding:".55rem .8rem",borderBottom:`1px solid ${C.bdr}`,display:"flex",alignItems:"center",gap:".4rem"})}>
        <span style={S({fontSize:".58rem",fontWeight:900,padding:".12rem .45rem",borderRadius:"2rem",color:"#fff",background:catCol})}>{prob.cat==="ron"?"論":"小"}</span>
        <span style={S({fontFamily:"'Zen Maru Gothic',sans-serif",fontWeight:700,fontSize:".78rem"})}>{prob.tech}</span>
        {isSolved && <span style={{fontSize:".7rem",marginLeft:"auto"}}>✅</span>}
      </div>

      {/* Passage */}
      <div style={S({margin:".55rem .7rem",padding:".65rem .8rem",background:"#fff",borderRadius:"9px",border:`1px solid ${C.bdr}`,fontSize:".79rem",lineHeight:1.9,position:"relative",whiteSpace:"pre-wrap"})}>
        <div style={S({position:"absolute",top:"-.45rem",left:".6rem",background:"#fff",padding:"0 .3rem",fontSize:".55rem",fontWeight:700,color:C.sub,letterSpacing:".05em"})}>本文</div>
        {renderPassage(prob.passage)}
      </div>

      {/* Question */}
      <div style={S({margin:".35rem .7rem",padding:".55rem .7rem",background:C.ambL,borderRadius:"8px",fontSize:".79rem",fontWeight:500})}>
        <span style={S({fontWeight:900,color:C.amb,fontSize:".68rem",marginRight:".25rem"})}>問</span>
        {prob.question}
      </div>

      {/* Options (select type) */}
      {prob.type === "select" && (
        <div style={S({padding:"0 .7rem"})}>
          {prob.options.map((opt,i)=>{
            const isCorrect = i === prob.answer;
            const isSelected = selected === i;
            let bg = "#fff";
            let border = C.bdr;
            if(isAnswered) {
              if(isCorrect) { bg = C.grnL; border = C.grn; }
              else if(isSelected && !isCorrect) { bg = "#fee2e2"; border = "#ef4444"; }
            } else if(isSelected) { bg = C.ronL; border = C.ron; }
            return (
              <div key={i} onClick={()=>{if(!isAnswered){playSound("select");setSelected(i);}}}
                style={S({padding:".45rem .7rem",marginBottom:".3rem",borderRadius:"8px",border:`1.5px solid ${border}`,background:bg,fontSize:".78rem",cursor:isAnswered?"default":"pointer",display:"flex",alignItems:"center",gap:".4rem",transition:"all .2s"})}>
                <span style={S({width:"20px",height:"20px",borderRadius:"50%",border:`2px solid ${border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:".6rem",fontWeight:900,flexShrink:0,color:isAnswered&&isCorrect?"#fff":"inherit",background:isAnswered&&isCorrect?C.grn:"transparent"})}>
                  {isAnswered && isCorrect ? "✓" : OPTION_LABEL[i]}
                </span>
                <span><strong style={{marginRight:".25rem"}}>{OPTION_LABEL[i]}</strong>{opt}</span>
              </div>
            );
          })}
        </div>
      )}

      {/* Answer Button */}
      {!isAnswered ? (
        <div style={S({padding:".3rem .7rem .6rem"})}>
          <button onClick={()=>showAns(prob.id)}
            style={S({padding:".4rem .7rem",borderRadius:"7px",background:C.grn,color:"#fff",border:"none",cursor:"pointer",fontSize:".72rem",fontWeight:700,fontFamily:"'Zen Maru Gothic',sans-serif"})}>
            答えと解説を見る
          </button>
        </div>
      ) : (
        <div style={S({margin:".2rem .7rem .6rem",padding:".65rem .8rem",background:"#fff",borderRadius:"8px",border:`1px solid ${C.grnM}`,fontSize:".78rem",lineHeight:1.8,animation:"slideUp .3s ease"})}>
          <div style={S({fontWeight:900,color:C.grn,fontSize:".68rem",marginBottom:".2rem"})}>✅ 答え</div>
          <div style={{fontWeight:600}}>{typeof prob.answer === "number" ? OPTION_LABEL[prob.answer]+"　"+prob.options[prob.answer] : prob.answer}</div>
          <div style={S({marginTop:".4rem",paddingTop:".4rem",borderTop:`1px dashed ${C.bdr}`,color:"#44403c",fontSize:".76rem"})}>
            <div style={S({fontWeight:900,color:C.pur,fontSize:".66rem",marginBottom:".15rem"})}>🔍 解き方ステップ</div>
            {prob.steps.map((s,i)=>(
              <div key={i} style={S({display:"flex",alignItems:"flex-start",gap:".35rem",margin:".2rem 0"})}>
                <div style={S({width:"17px",height:"17px",borderRadius:"50%",background:C.pur,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:".55rem",fontWeight:900,flexShrink:0,marginTop:"3px"})}>{i+1}</div>
                <div>{s}</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════
// PRACTICE PAGE (Quiz Mode)
// ═══════════════════════════════════════
function PracticePage({quizIdx,setQuizIdx,quizAnswered,setQuizAnswered,quizMode,setQuizMode,solved,setSolved,showAnswers,setShowAnswers}) {
  const [qSelected, setQSelected] = useState(null);
  const prob = PROBLEMS[quizIdx];
  const total = PROBLEMS.length;
  const answeredCount = Object.keys(quizAnswered).length;
  const correctCount = Object.values(quizAnswered).filter(v=>v).length;
  const isAnswered = quizAnswered[prob?.id] !== undefined;

  const checkAnswer = () => {
    if(!prob) return;
    let correct = false;
    if(prob.type==="select") correct = qSelected === prob.answer;
    else correct = true;
    playSound(correct ? "correct" : "wrong");
    setQuizAnswered({...quizAnswered, [prob.id]: correct});
    const s = new Set(solved); s.add(prob.id); setSolved(s);
    const sa = new Set(showAnswers); sa.add(prob.id); setShowAnswers(sa);
  };

  const next = () => { if(quizIdx < total-1) { playSound("nav"); setQuizIdx(quizIdx+1); setQSelected(null); } };
  const prev = () => { if(quizIdx > 0) { playSound("nav"); setQuizIdx(quizIdx-1); setQSelected(null); } };

  if(!prob) return null;

  const renderPassage = (text) => {
    const parts = text.split(/\u2605(.*?)\u2605/g);
    return parts.map((part,i) => i%2===1
      ? <span key={i} style={{borderBottom:"2px solid "+C.ron,paddingBottom:"1px",fontWeight:600}}>{part}</span>
      : <span key={i}>{part}</span>
    );
  };

  const catLabel = prob.cat==="ron"?"📘 論説文":prob.cat==="sho"?"📕 小説文":"🎯 共通";
  const catCol = prob.cat==="ron"?C.ron:prob.cat==="sho"?C.sho:C.grn;

  return (
    <div className="slide-up">
      <div style={S({background:"linear-gradient(145deg,#0c1222,#1a2744)",padding:"1.5rem 1.2rem 1rem"})}>
        <div style={S({fontFamily:"'Zen Maru Gothic',sans-serif",fontSize:"1.25rem",fontWeight:900,color:"#fff"})}>✏️ 実践問題</div>
        <div style={S({fontSize:".72rem",color:"#94a3b8",marginTop:".2rem"})}>全{total}問 ─ 解いた数：{answeredCount}問 正解：{correctCount}問</div>
        <div style={S({width:"100%",height:"4px",borderRadius:"2px",background:"rgba(255,255,255,.1)",marginTop:".6rem",overflow:"hidden"})}>
          <div style={S({height:"100%",borderRadius:"2px",background:"linear-gradient(90deg,#2563eb,#0d9488)",width:`${(quizIdx+1)/total*100}%`,transition:"width .3s"})}/>
        </div>
      </div>

      <div style={S({padding:"1rem"})}>
        {/* Problem Counter */}
        <div style={S({display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:".6rem"})}>
          <span style={S({fontSize:".72rem",fontWeight:700,color:catCol,background:prob.cat==="ron"?C.ronL:prob.cat==="sho"?C.shoL:C.grnL,padding:".2rem .6rem",borderRadius:"2rem"})}>{catLabel}</span>
          <span style={S({fontFamily:"'Zen Maru Gothic',sans-serif",fontWeight:900,fontSize:".85rem",color:C.sub})}>{quizIdx+1} / {total}</span>
        </div>

        {/* Problem */}
        <div style={S({background:"#fff",borderRadius:"14px",overflow:"hidden",border:`1px solid ${C.bdr}`,boxShadow:"0 2px 8px rgba(0,0,0,.04)"})}>
          <div style={S({padding:".65rem .9rem",background:"linear-gradient(135deg,#f8fafc,#f1f5f9)",borderBottom:`1px solid ${C.bdr}`,fontFamily:"'Zen Maru Gothic',sans-serif",fontWeight:700,fontSize:".82rem"})}>{prob.tech}</div>

          <div style={S({margin:".6rem .8rem",padding:".65rem .8rem",background:"#fafaf8",borderRadius:"9px",border:`1px solid ${C.bdr}`,fontSize:".79rem",lineHeight:1.9,whiteSpace:"pre-wrap"})}>
            {renderPassage(prob.passage)}
          </div>

          <div style={S({margin:".4rem .8rem",padding:".5rem .7rem",background:C.ambL,borderRadius:"8px",fontSize:".79rem",fontWeight:500})}>
            <span style={S({fontWeight:900,color:C.amb,fontSize:".68rem",marginRight:".2rem"})}>問</span>
            {prob.question}
          </div>

          {prob.type==="select" && (
            <div style={S({padding:".3rem .8rem"})}>
              {prob.options.map((opt,i)=>{
                const isCorrect = i===prob.answer;
                const isSel = qSelected===i;
                let bg="#fff",bdr=C.bdr;
                if(isAnswered){
                  if(isCorrect){bg=C.grnL;bdr=C.grn;}
                  else if(isSel&&!isCorrect){bg="#fee2e2";bdr="#ef4444";}
                }else if(isSel){bg=C.ronL;bdr=C.ron;}
                return(
                  <div key={i} onClick={()=>{if(!isAnswered){playSound("select");setQSelected(i);}}}
                    style={S({padding:".4rem .65rem",marginBottom:".25rem",borderRadius:"8px",border:`1.5px solid ${bdr}`,background:bg,fontSize:".78rem",cursor:isAnswered?"default":"pointer",display:"flex",alignItems:"center",gap:".35rem",transition:"all .15s"})}>
                    <span style={S({width:"18px",height:"18px",borderRadius:"50%",border:`2px solid ${bdr}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:".57rem",fontWeight:900,flexShrink:0,background:isAnswered&&isCorrect?C.grn:"transparent",color:isAnswered&&isCorrect?"#fff":"inherit"})}>
                      {isAnswered&&isCorrect?"✓":OPTION_LABEL[i]}
                    </span>
                    <span><strong style={{marginRight:".25rem"}}>{OPTION_LABEL[i]}</strong>{opt}</span>
                  </div>
                );
              })}
            </div>
          )}

          {/* Answer/Check */}
          <div style={S({padding:".4rem .8rem .7rem"})}>
            {!isAnswered ? (
              <button onClick={checkAnswer}
                style={S({width:"100%",padding:".5rem",borderRadius:"8px",border:"none",background:C.grn,color:"#fff",fontSize:".78rem",fontWeight:700,cursor:"pointer",fontFamily:"'Zen Maru Gothic',sans-serif"})}>
                答え合わせ
              </button>
            ) : (
              <div style={S({padding:".65rem .8rem",background:"#fff",borderRadius:"8px",border:`1px solid ${C.grnM}`,fontSize:".76rem",lineHeight:1.8})}>
                <div style={S({fontWeight:900,color:C.grn,fontSize:".66rem"})}>✅ 答え</div>
                <div style={{fontWeight:600,margin:".15rem 0"}}>{typeof prob.answer==="number"?OPTION_LABEL[prob.answer]+"　"+prob.options[prob.answer]:prob.answer}</div>
                <div style={S({marginTop:".3rem",paddingTop:".3rem",borderTop:`1px dashed ${C.bdr}`,fontSize:".74rem",color:"#44403c"})}>
                  <div style={S({fontWeight:900,color:C.pur,fontSize:".64rem",marginBottom:".1rem"})}>🔍 解き方</div>
                  {prob.steps.map((s,i)=>(
                    <div key={i} style={S({display:"flex",gap:".3rem",margin:".15rem 0",alignItems:"flex-start"})}>
                      <div style={S({width:"16px",height:"16px",borderRadius:"50%",background:C.pur,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:".52rem",fontWeight:900,flexShrink:0,marginTop:"3px"})}>{i+1}</div>
                      <div>{s}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>

        {/* Navigation */}
        <div style={S({display:"flex",gap:".5rem",marginTop:".8rem"})}>
          <button onClick={prev} disabled={quizIdx===0}
            style={S({flex:1,padding:".5rem",borderRadius:"10px",border:`1px solid ${C.bdr}`,background:"#fff",fontSize:".78rem",fontWeight:600,cursor:quizIdx===0?"default":"pointer",opacity:quizIdx===0?.4:1,fontFamily:"'Zen Maru Gothic',sans-serif"})}>
            ← 前の問題
          </button>
          <button onClick={next} disabled={quizIdx===total-1}
            style={S({flex:1,padding:".5rem",borderRadius:"10px",border:"none",background:C.ron,color:"#fff",fontSize:".78rem",fontWeight:600,cursor:quizIdx===total-1?"default":"pointer",opacity:quizIdx===total-1?.4:1,fontFamily:"'Zen Maru Gothic',sans-serif"})}>
            次の問題 →
          </button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════
// PROGRESS PAGE
// ═══════════════════════════════════════
function ProgressPage({solved,totalProblems,progress}) {
  const ronSolved = PROBLEMS.filter(p=>p.cat==="ron"&&solved.has(p.id)).length;
  const shoSolved = PROBLEMS.filter(p=>p.cat==="sho"&&solved.has(p.id)).length;
  const comSolved = PROBLEMS.filter(p=>p.cat==="common"&&solved.has(p.id)).length;
  const ronTotal = PROBLEMS.filter(p=>p.cat==="ron").length;
  const shoTotal = PROBLEMS.filter(p=>p.cat==="sho").length;
  const comTotal = PROBLEMS.filter(p=>p.cat==="common").length;

  const ProgressRing = ({pct,color,size=72}) => {
    const r = (size-10)/2;
    const circ = 2*Math.PI*r;
    return (
      <div style={{position:"relative",width:size,height:size}}>
        <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={C.bdr} strokeWidth="5"/>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="5" strokeLinecap="round"
            strokeDasharray={circ} strokeDashoffset={circ*(1-pct/100)} style={{transition:"stroke-dashoffset 1s ease"}}/>
        </svg>
        <div style={S({position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Zen Maru Gothic',sans-serif",fontWeight:900,fontSize:size>60?".95rem":".75rem",color})}>{pct}%</div>
      </div>
    );
  };

  return (
    <div className="slide-up">
      <div style={S({background:"linear-gradient(145deg,#0c1222,#1a2744)",padding:"1.5rem 1.2rem 1rem"})}>
        <div style={S({fontFamily:"'Zen Maru Gothic',sans-serif",fontSize:"1.25rem",fontWeight:900,color:"#fff"})}>📊 学習記録</div>
        <div style={S({fontSize:".72rem",color:"#94a3b8",marginTop:".2rem"})}>あなたの頑張りを可視化</div>
      </div>

      <div style={S({padding:"1rem"})}>
        {/* Overall */}
        <div style={S({background:"#fff",borderRadius:"16px",padding:"1.3rem",marginBottom:".8rem",border:`1px solid ${C.bdr}`,textAlign:"center"})}>
          <ProgressRing pct={progress} color={C.grn} size={90}/>
          <div style={S({fontFamily:"'Zen Maru Gothic',sans-serif",fontWeight:700,fontSize:".95rem",marginTop:".6rem"})}>全体の進捗</div>
          <div style={S({fontSize:".75rem",color:C.sub})}>{solved.size} / {totalProblems} 問クリア</div>
          <div style={S({fontSize:".78rem",marginTop:".6rem",padding:".5rem",borderRadius:"8px",background:progress>=80?C.grnL:progress>=40?C.ambL:C.ronL,color:progress>=80?C.grn:progress>=40?C.amb:C.ron,fontWeight:600})}>
            {progress>=100?"🎉 全問制覇！おめでとう！":progress>=80?"🔥 あと少し！ゴールが見えてきた！":progress>=40?"💪 いい調子！この勢いで進もう！":"🌱 まずは1問ずつ。焦らず着実に！"}
          </div>
        </div>

        {/* By Category */}
        <div style={S({fontSize:".68rem",fontWeight:700,color:C.sub,letterSpacing:".08em",marginBottom:".5rem"})}>📂 カテゴリ別</div>
        {[
          {label:"📘 論説文",solved:ronSolved,total:ronTotal,color:C.ron,bg:C.ronL},
          {label:"📕 小説文",solved:shoSolved,total:shoTotal,color:C.sho,bg:C.shoL},
          {label:"🎯 共通テク",solved:comSolved,total:comTotal,color:C.grn,bg:C.grnL},
        ].map((c,i)=>{
          const pct = c.total>0?Math.round(c.solved/c.total*100):0;
          return (
            <div key={i} style={S({background:"#fff",borderRadius:"12px",padding:".8rem 1rem",marginBottom:".5rem",border:`1px solid ${C.bdr}`,display:"flex",alignItems:"center",gap:".8rem"})}>
              <ProgressRing pct={pct} color={c.color} size={52}/>
              <div style={{flex:1}}>
                <div style={S({fontFamily:"'Zen Maru Gothic',sans-serif",fontWeight:700,fontSize:".85rem"})}>{c.label}</div>
                <div style={S({fontSize:".72rem",color:C.sub})}>{c.solved} / {c.total} 問</div>
                <div style={S({width:"100%",height:"5px",borderRadius:"3px",background:C.bdr,marginTop:".3rem",overflow:"hidden"})}>
                  <div style={S({height:"100%",borderRadius:"3px",background:c.color,width:`${pct}%`,transition:"width .8s"})}/>
                </div>
              </div>
            </div>
          );
        })}

        {/* Mastered Techniques */}
        <div style={S({background:"#fff",borderRadius:"14px",padding:"1rem",marginTop:".5rem",border:`1px solid ${C.bdr}`})}>
          <div style={S({fontFamily:"'Zen Maru Gothic',sans-serif",fontWeight:700,fontSize:".88rem",marginBottom:".5rem"})}>🏆 学習したテクニック</div>
          <div style={S({display:"flex",flexWrap:"wrap",gap:".3rem"})}>
            {[...new Set(PROBLEMS.filter(p=>solved.has(p.id)).map(p=>p.tech))].map(tech=>(
              <span key={tech} style={S({fontSize:".68rem",fontWeight:600,padding:".2rem .55rem",borderRadius:"2rem",background:C.grnL,color:C.grn,border:`1px solid ${C.grnM}`})}>✓ {tech}</span>
            ))}
            {solved.size===0 && <div style={S({fontSize:".78rem",color:C.sub})}>まだ問題を解いていません。「実践」タブから始めよう！</div>}
          </div>
        </div>

        {/* Motivation */}
        <div style={S({textAlign:"center",marginTop:"1.2rem",padding:"1rem",background:"linear-gradient(135deg,#0f172a,#1e293b)",borderRadius:"14px"})}>
          <div style={{fontSize:"1.5rem",marginBottom:".4rem"}}>📖</div>
          <div style={S({fontFamily:"'Shippori Mincho',serif",fontSize:".88rem",color:"#e2e8f0",fontWeight:500,lineHeight:1.8})}>
            読解は「宝探し」──<br/>答えは必ず本文の中にある。
          </div>
          <div style={S({fontSize:".7rem",color:"#64748b",marginTop:".3rem"})}>一歩ずつ、着実に。きみなら大丈夫。</div>
          <div style={S({marginTop:".8rem",paddingTop:".6rem",borderTop:"1px solid rgba(255,255,255,.06)",display:"flex",alignItems:"center",justifyContent:"center",gap:".4rem"})}>
            <span style={S({fontSize:".7rem"})}>⛺</span>
            <span style={S({fontSize:".6rem",fontWeight:900,color:"#fbbf24",letterSpacing:".12em",fontFamily:"'Zen Maru Gothic',sans-serif"})}>JUKEN CAMP</span>
          </div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
